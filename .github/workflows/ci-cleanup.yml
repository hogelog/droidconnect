on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  prune-prereleases:
    runs-on: ubuntu-latest
    steps:
      - name: Prune old CI prereleases (keep latest 5)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          KEEP: 5
        run: |
          gh release list --limit 200 \
            --json tagName,createdAt,isPrerelease \
            --jq "[.[] | select(.isPrerelease and (.tagName | startswith(\"ci-\")))]
                  | sort_by(.createdAt) | reverse | .[${KEEP}:] | .[].tagName" \
            | while read -r TAG; do
                [ -z "$TAG" ] && continue
                echo "Deleting old CI prerelease ${TAG}"
                gh release delete "$TAG" --yes --cleanup-tag
              done
