name: CI Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete-prerelease:
    runs-on: ubuntu-latest
    steps:
      - name: Delete CI prerelease for closed PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          TAG="ci-pr-${PR_NUMBER}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Deleting CI prerelease ${TAG}"
            gh release delete "$TAG" --yes --cleanup-tag
          else
            echo "No CI prerelease ${TAG} to delete"
          fi
