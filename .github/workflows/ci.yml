name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      # Fix deprecated classifier() removed in Gradle 8.x (used by Termux submodule)
      - name: Patch vendor build scripts
        run: sed -i 's/classifier "sources"/archiveClassifier.set("sources")/' vendor/termux-app/terminal-emulator/build.gradle

      - run: ./gradlew assembleDebug lint
