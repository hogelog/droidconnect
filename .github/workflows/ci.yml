on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          # Full history + tags so versionCode can count commits since the previous v* tag.
          fetch-depth: 0

      - name: Compute submodule cache key
        id: submodule-key
        run: |
          paths=$(git config -f .gitmodules --get-regexp path | awk '{print $2}')
          hash=$(git ls-tree HEAD -- $paths | sha256sum | awk '{print $1}')
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: submodule-cache
        with:
          path: |
            vendor
            .git/modules
          key: submodules-v2-${{ hashFiles('.gitmodules') }}-${{ steps.submodule-key.outputs.hash }}

      - name: Initialize submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Drop maven-publish blocks (unused, broken under Gradle 8+) and rewrite
      # `proguard-android.txt` to the `-optimize` variant required by AGP 9.0.
      - name: Patch vendor build scripts
        run: |
          for f in vendor/termux-app/terminal-emulator/build.gradle vendor/termux-app/terminal-view/build.gradle; do
            sed -i "/apply plugin: 'maven-publish'/d; /task sourceJar/,/^}/d; /afterEvaluate/,/^}/d; s/proguard-android\.txt/proguard-android-optimize.txt/g" "$f"
          done

      - name: Build debug APK
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: ./gradlew assembleDebug --configuration-cache

      - name: Publish CI prerelease for PR
        id: ci_prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          TAG="ci-pr-${PR_NUMBER}"
          APK_NAME="pocketsecureshell-pr-${PR_NUMBER}-${SHORT_SHA}-debug.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          # Replace any existing release for this PR so only one prerelease
          # exists per PR at any time.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Deleting previous release ${TAG}"
            gh release delete "$TAG" --yes --cleanup-tag
          fi
          gh release create "$TAG" \
            --title "CI build for PR #${PR_NUMBER} (${SHORT_SHA})" \
            --notes "Automatic CI build of ${HEAD_SHA} for PR #${PR_NUMBER}" \
            --prerelease \
            --target "${HEAD_SHA}" \
            "$APK_NAME"
          {
            echo "tag=${TAG}"
            echo "apk_name=${APK_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Comment release info on PR
        if: steps.ci_prerelease.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          TAG: ${{ steps.ci_prerelease.outputs.tag }}
          APK_NAME: ${{ steps.ci_prerelease.outputs.apk_name }}
        run: |
          RELEASE_URL="${SERVER_URL}/${REPO}/releases/tag/${TAG}"
          APK_URL="${SERVER_URL}/${REPO}/releases/download/${TAG}/${APK_NAME}"
          MARKER="<!-- pocketsecureshell-ci-build -->"

          # Hide previous CI build comments on this PR
          gh api graphql \
            -F owner="$REPO_OWNER" -F name="$REPO_NAME" -F number="$PR_NUMBER" \
            -f query='
              query($owner:String!, $name:String!, $number:Int!) {
                repository(owner: $owner, name: $name) {
                  pullRequest(number: $number) {
                    comments(first: 100) {
                      nodes { id body isMinimized }
                    }
                  }
                }
              }' \
            --jq ".data.repository.pullRequest.comments.nodes[]
                  | select((.isMinimized | not) and (.body | startswith(\"${MARKER}\")))
                  | .id" \
            | while read -r node_id; do
                [ -z "$node_id" ] && continue
                echo "Hiding previous CI comment: $node_id"
                gh api graphql -F id="$node_id" -f query='
                  mutation($id:ID!) {
                    minimizeComment(input: {subjectId: $id, classifier: OUTDATED}) {
                      minimizedComment { isMinimized }
                    }
                  }'
              done

          gh pr comment "$PR_NUMBER" --body "${MARKER}
          CI build for \`${HEAD_SHA}\` is ready.

          - Release: ${RELEASE_URL}
          - APK: [\`${APK_NAME}\`](${APK_URL})
          - Revision: \`${HEAD_SHA}\`"

      - name: Upload to DeployGate
        env:
          DEPLOYGATE_API_KEY: ${{ secrets.DEPLOYGATE_API_KEY }}
          DEPLOYGATE_USER_NAME: ${{ secrets.DEPLOYGATE_USER_NAME }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          curl -sSL --fail-with-body \
            -H "Authorization: Bearer ${DEPLOYGATE_API_KEY}" \
            -F "file=@app/build/outputs/apk/debug/app-debug.apk" \
            --form-string "message=PR #${PR_NUMBER} ${SHORT_SHA}" \
            "https://deploygate.com/api/users/${DEPLOYGATE_USER_NAME}/apps"

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute submodule cache key
        id: submodule-key
        run: |
          paths=$(git config -f .gitmodules --get-regexp path | awk '{print $2}')
          hash=$(git ls-tree HEAD -- $paths | sha256sum | awk '{print $1}')
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: submodule-cache
        with:
          path: |
            vendor
            .git/modules
          key: submodules-v2-${{ hashFiles('.gitmodules') }}-${{ steps.submodule-key.outputs.hash }}

      - name: Initialize submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Drop maven-publish blocks (unused, broken under Gradle 8+) and rewrite
      # `proguard-android.txt` to the `-optimize` variant required by AGP 9.0.
      - name: Patch vendor build scripts
        run: |
          for f in vendor/termux-app/terminal-emulator/build.gradle vendor/termux-app/terminal-view/build.gradle; do
            sed -i "/apply plugin: 'maven-publish'/d; /task sourceJar/,/^}/d; /afterEvaluate/,/^}/d; s/proguard-android\.txt/proguard-android-optimize.txt/g" "$f"
          done

      - name: Run lint
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: ./gradlew :app:lintDebug --configuration-cache

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute submodule cache key
        id: submodule-key
        run: |
          paths=$(git config -f .gitmodules --get-regexp path | awk '{print $2}')
          hash=$(git ls-tree HEAD -- $paths | sha256sum | awk '{print $1}')
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: submodule-cache
        with:
          path: |
            vendor
            .git/modules
          key: submodules-v2-${{ hashFiles('.gitmodules') }}-${{ steps.submodule-key.outputs.hash }}

      - name: Initialize submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Drop maven-publish blocks (unused, broken under Gradle 8+) and rewrite
      # `proguard-android.txt` to the `-optimize` variant required by AGP 9.0.
      - name: Patch vendor build scripts
        run: |
          for f in vendor/termux-app/terminal-emulator/build.gradle vendor/termux-app/terminal-view/build.gradle; do
            sed -i "/apply plugin: 'maven-publish'/d; /task sourceJar/,/^}/d; /afterEvaluate/,/^}/d; s/proguard-android\.txt/proguard-android-optimize.txt/g" "$f"
          done

      - name: Run unit tests
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: ./gradlew :app:testDebugUnitTest --configuration-cache
