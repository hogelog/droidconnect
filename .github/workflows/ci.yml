name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: contains(fromJSON(vars.CI_ALLOWED_USERS), github.event.pull_request.user.login)
    runs-on: ubuntu-latest

    steps:
      # Check out the PR head branch (not the merge ref) so a regenerated
      # gradle.lockfile can be committed back to the PR.
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ github.head_ref }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6

      # Remove publishing blocks incompatible with Gradle 8.x (unused by this project)
      - name: Patch vendor build scripts
        run: |
          for f in vendor/termux-app/terminal-emulator/build.gradle vendor/termux-app/terminal-view/build.gradle; do
            sed -i "/apply plugin: 'maven-publish'/d; /task sourceJar/,/^}/d; /afterEvaluate/,/^}/d" "$f"
          done

      # Regenerate the dependency lockfile so PRs that change dependencies
      # don't require a local gradle run -- droidconnect is developed
      # without a PC (phone + aka agent), and the aka sandbox cannot run
      # gradle due to thread/process limits.
      #
      # If the lockfile changed, commit it back to the PR branch and stop
      # this run. The push uses GITHUB_TOKEN, which by design does NOT
      # retrigger CI -- the PR author must re-run CI once (e.g. via the
      # GitHub mobile "Re-run jobs" button). That single click then builds
      # against the now-current lockfile.
      - name: Regenerate gradle.lockfile
        run: ./gradlew writeLocks --write-locks

      - name: Commit regenerated gradle.lockfile if changed
        id: lock_commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if git diff --quiet app/gradle.lockfile; then
            echo "Lockfile unchanged; continuing with build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/gradle.lockfile
          git commit -m "chore: regenerate gradle.lockfile"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          gh pr comment "$PR_NUMBER" --body "gradle.lockfile regenerated and pushed by CI. Re-run this workflow to build against the updated lockfile."

      - name: Build debug APK and run lint
        if: steps.lock_commit.outputs.changed == 'false'
        run: ./gradlew assembleDebug lint

      - name: Publish CI prerelease for PR
        id: ci_prerelease
        if: steps.lock_commit.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          TAG="ci-pr-${PR_NUMBER}"
          APK_NAME="droidconnect-pr-${PR_NUMBER}-${SHORT_SHA}-debug.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          # Replace any existing release for this PR so only one prerelease
          # exists per PR at any time.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Deleting previous release ${TAG}"
            gh release delete "$TAG" --yes --cleanup-tag
          fi
          gh release create "$TAG" \
            --title "CI build for PR #${PR_NUMBER} (${SHORT_SHA})" \
            --notes "Automatic CI build of ${HEAD_SHA} for PR #${PR_NUMBER}" \
            --prerelease \
            --target "${HEAD_SHA}" \
            "$APK_NAME"
          {
            echo "tag=${TAG}"
            echo "apk_name=${APK_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Comment release info on PR
        if: steps.ci_prerelease.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          TAG: ${{ steps.ci_prerelease.outputs.tag }}
          APK_NAME: ${{ steps.ci_prerelease.outputs.apk_name }}
        run: |
          RELEASE_URL="${SERVER_URL}/${REPO}/releases/tag/${TAG}"
          MARKER="<!-- droidconnect-ci-build -->"

          # Hide previous CI build comments on this PR
          gh api graphql \
            -F owner="$REPO_OWNER" -F name="$REPO_NAME" -F number="$PR_NUMBER" \
            -f query='
              query($owner:String!, $name:String!, $number:Int!) {
                repository(owner: $owner, name: $name) {
                  pullRequest(number: $number) {
                    comments(first: 100) {
                      nodes { id body isMinimized }
                    }
                  }
                }
              }' \
            --jq ".data.repository.pullRequest.comments.nodes[]
                  | select((.isMinimized | not) and (.body | startswith(\"${MARKER}\")))
                  | .id" \
            | while read -r node_id; do
                [ -z "$node_id" ] && continue
                echo "Hiding previous CI comment: $node_id"
                gh api graphql -F id="$node_id" -f query='
                  mutation($id:ID!) {
                    minimizeComment(input: {subjectId: $id, classifier: OUTDATED}) {
                      minimizedComment { isMinimized }
                    }
                  }'
              done

          gh pr comment "$PR_NUMBER" --body "${MARKER}
          CI build for \`${HEAD_SHA}\` is ready.

          - Release: ${RELEASE_URL}
          - APK: \`${APK_NAME}\`
          - Revision: \`${HEAD_SHA}\`"
