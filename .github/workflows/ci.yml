name: CI

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6

      # Remove publishing blocks incompatible with Gradle 8.x (unused by this project)
      - name: Patch vendor build scripts
        run: |
          for f in vendor/termux-app/terminal-emulator/build.gradle vendor/termux-app/terminal-view/build.gradle; do
            sed -i "/apply plugin: 'maven-publish'/d; /task sourceJar/,/^}/d; /afterEvaluate/,/^}/d" "$f"
          done

      - run: ./gradlew assembleDebug lint

      - name: Publish CI prerelease
        id: ci_prerelease
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="ci-${SHORT_SHA}"
          APK_NAME="droidconnect-${SHORT_SHA}-debug.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          gh release create "$TAG" \
            --title "CI build ${SHORT_SHA}" \
            --notes "Automatic CI build of ${GITHUB_SHA}" \
            --prerelease \
            --target "${GITHUB_SHA}" \
            "$APK_NAME"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          {
            echo "short_sha=${SHORT_SHA}"
            echo "tag=${TAG}"
            echo "apk_name=${APK_NAME}"
            echo "release_url=${RELEASE_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Comment release info on associated PRs
        if: github.event_name == 'push' && steps.ci_prerelease.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHORT_SHA: ${{ steps.ci_prerelease.outputs.short_sha }}
          TAG: ${{ steps.ci_prerelease.outputs.tag }}
          APK_NAME: ${{ steps.ci_prerelease.outputs.apk_name }}
          RELEASE_URL: ${{ steps.ci_prerelease.outputs.release_url }}
        run: |
          PR_NUMBERS=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[] | select(.state == "open") | .number')
          if [ -z "$PR_NUMBERS" ]; then
            echo "No open PR associated with ${GITHUB_SHA}"
            exit 0
          fi
          BODY=$(cat <<EOF
          CI build for \`${GITHUB_SHA}\` is ready.

          - Release: ${RELEASE_URL}
          - APK: \`${APK_NAME}\`
          - Revision: \`${GITHUB_SHA}\` (\`${SHORT_SHA}\`)
          EOF
          )
          while read -r PR; do
            [ -z "$PR" ] && continue
            echo "Commenting on PR #${PR}"
            gh pr comment "$PR" --body "$BODY"
          done <<< "$PR_NUMBERS"

      - name: Prune old CI prereleases (keep last 5)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,createdAt,isPrerelease \
            | jq -r '[.[] | select(.isPrerelease and (.tagName | startswith("ci-")))]
                     | sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
            | while read -r tag; do
                [ -z "$tag" ] && continue
                echo "Deleting old prerelease: $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done
