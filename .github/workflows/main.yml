name: Main

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Compute submodule cache key
        id: submodule-key
        run: |
          paths=$(git config -f .gitmodules --get-regexp path | awk '{print $2}')
          hash=$(git ls-tree HEAD -- $paths | sha256sum | awk '{print $1}')
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        id: submodule-cache
        with:
          path: vendor
          key: submodules-v1-${{ hashFiles('.gitmodules') }}-${{ steps.submodule-key.outputs.hash }}

      - name: Initialize submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6

      # Remove publishing blocks incompatible with Gradle 8.x (unused by this project)
      - name: Patch vendor build scripts
        run: |
          for f in vendor/termux-app/terminal-emulator/build.gradle vendor/termux-app/terminal-view/build.gradle; do
            sed -i "/apply plugin: 'maven-publish'/d; /task sourceJar/,/^}/d; /afterEvaluate/,/^}/d" "$f"
          done

      - name: Build debug APK
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
        run: ./gradlew assembleDebug

      - name: Publish main debug prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          TAG="main-debug"
          APK_NAME="droidconnect-main-${SHORT_SHA}-debug.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          # Replace any existing main-debug release so only the latest main
          # build is published under this tag.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Deleting previous release ${TAG}"
            gh release delete "$TAG" --yes --cleanup-tag
          fi
          gh release create "$TAG" \
            --title "Main debug build (${SHORT_SHA})" \
            --notes "Automatic debug build of main at ${HEAD_SHA}" \
            --prerelease \
            --target "${HEAD_SHA}" \
            "$APK_NAME"
