on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so versionCode can count commits since the previous v* tag.
          fetch-depth: 0

      - name: Compute submodule cache key
        id: submodule-key
        run: |
          paths=$(git config -f .gitmodules --get-regexp path | awk '{print $2}')
          hash=$(git ls-tree HEAD -- $paths | sha256sum | awk '{print $1}')
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: submodule-cache
        with:
          path: |
            vendor
            .git/modules
          key: submodules-v2-${{ hashFiles('.gitmodules') }}-${{ steps.submodule-key.outputs.hash }}

      - name: Initialize submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # See release.yml: WIF subject token chain hits roots not in Temurin's
      # bundled cacerts; install ca-certificates-java so publishReleaseBundle works.
      - name: Install ca-certificates-java and point JVM at it
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates-java
          echo "JAVA_TOOL_OPTIONS=-Djavax.net.ssl.trustStore=/etc/ssl/certs/java/cacerts -Djavax.net.ssl.trustStorePassword=changeit" >> "$GITHUB_ENV"

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-write-only: true

      # Skipped when the Play Console / WIF setup is incomplete (vars unset); the
      # debug/DeployGate path still publishes.
      - name: Authenticate to Google Cloud
        id: gcloud-auth
        if: ${{ vars.GCLOUD_WIF_PROVIDER != '' && vars.GCLOUD_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCLOUD_WIF_PROVIDER }}
          service_account: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}

      # Drop maven-publish blocks (unused, broken under Gradle 8+) and rewrite
      # `proguard-android.txt` to the `-optimize` variant required by AGP 9.0.
      - name: Patch vendor build scripts
        run: |
          for f in vendor/termux-app/terminal-emulator/build.gradle vendor/termux-app/terminal-view/build.gradle; do
            sed -i "/apply plugin: 'maven-publish'/d; /task sourceJar/,/^}/d; /afterEvaluate/,/^}/d; s/proguard-android\.txt/proguard-android-optimize.txt/g" "$f"
          done

      - name: Read baseVersionName
        id: base-version
        run: |
          v=$(grep -oP 'val baseVersionName = "\K[0-9]+\.[0-9]+\.[0-9]+' app/build.gradle.kts)
          if [[ -z "$v" ]]; then
            echo "Unable to extract baseVersionName from app/build.gradle.kts" >&2
            exit 1
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/release.keystore"

      - name: Build debug APK and signed release AAB
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          RELEASE_VERSION: ${{ steps.base-version.outputs.value }}
          RELEASE_VERSION_SUFFIX: ${{ github.sha }}
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleDebug bundleRelease

      # Re-passes the build env so the build script's signingConfigs block keeps
      # evaluating cleanly; bundleRelease itself stays UP-TO-DATE from the build step.
      - name: Publish AAB to Play Store internal track
        if: ${{ steps.gcloud-auth.outcome == 'success' }}
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          RELEASE_VERSION: ${{ steps.base-version.outputs.value }}
          RELEASE_VERSION_SUFFIX: ${{ github.sha }}
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew publishReleaseBundle

      - name: Remove keystore from runner
        if: always()
        run: rm -f "${RUNNER_TEMP}/release.keystore"

      - name: Publish main debug prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          TAG="main-debug"
          APK_NAME="pocketsecureshell-main-${SHORT_SHA}-debug.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          # Replace any existing main-debug release so only the latest main
          # build is published under this tag.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Deleting previous release ${TAG}"
            gh release delete "$TAG" --yes --cleanup-tag
          fi
          gh release create "$TAG" \
            --title "Main debug build (${SHORT_SHA})" \
            --notes "Automatic debug build of main at ${HEAD_SHA}" \
            --prerelease \
            --target "${HEAD_SHA}" \
            "$APK_NAME"

      - name: Upload to DeployGate
        env:
          DEPLOYGATE_API_KEY: ${{ secrets.DEPLOYGATE_API_KEY }}
          DEPLOYGATE_USER_NAME: ${{ secrets.DEPLOYGATE_USER_NAME }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          curl -sSL --fail-with-body \
            -H "Authorization: Bearer ${DEPLOYGATE_API_KEY}" \
            -F "file=@app/build/outputs/apk/debug/app-debug.apk" \
            --form-string "message=main ${SHORT_SHA}" \
            "https://deploygate.com/api/users/${DEPLOYGATE_USER_NAME}/apps"

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Compute submodule cache key
        id: submodule-key
        run: |
          paths=$(git config -f .gitmodules --get-regexp path | awk '{print $2}')
          hash=$(git ls-tree HEAD -- $paths | sha256sum | awk '{print $1}')
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: submodule-cache
        with:
          path: |
            vendor
            .git/modules
          key: submodules-v2-${{ hashFiles('.gitmodules') }}-${{ steps.submodule-key.outputs.hash }}

      - name: Initialize submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-write-only: true

      # Drop maven-publish blocks (unused, broken under Gradle 8+) and rewrite
      # `proguard-android.txt` to the `-optimize` variant required by AGP 9.0.
      - name: Patch vendor build scripts
        run: |
          for f in vendor/termux-app/terminal-emulator/build.gradle vendor/termux-app/terminal-view/build.gradle; do
            sed -i "/apply plugin: 'maven-publish'/d; /task sourceJar/,/^}/d; /afterEvaluate/,/^}/d; s/proguard-android\.txt/proguard-android-optimize.txt/g" "$f"
          done

      - name: Run lint
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
        run: ./gradlew :app:lintDebug --configuration-cache
