on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so versionCode can count commits since the previous v* tag.
          fetch-depth: 0

      - name: Derive release version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag $GITHUB_REF_NAME does not match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Compute submodule cache key
        id: submodule-key
        run: |
          paths=$(git config -f .gitmodules --get-regexp path | awk '{print $2}')
          hash=$(git ls-tree HEAD -- $paths | sha256sum | awk '{print $1}')
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: submodule-cache
        with:
          path: |
            vendor
            .git/modules
          key: submodules-v2-${{ hashFiles('.gitmodules') }}-${{ steps.submodule-key.outputs.hash }}

      - name: Initialize submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # Temurin 17's bundled cacerts misses roots that the Workload Identity
      # Federation HTTPS chain hits (subject token from
      # *.actions.githubusercontent.com), making Gradle Play Publisher's
      # publishReleaseBundle fail with "PKIX path building failed". Pointing the
      # JVM at the runner's system trust store has the same Mozilla CA set the
      # rest of the runner already trusts.
      - name: Point JVM at system Java trust store
        run: |
          echo "JAVA_TOOL_OPTIONS=-Djavax.net.ssl.trustStore=/etc/ssl/certs/java/cacerts -Djavax.net.ssl.trustStorePassword=changeit" >> "$GITHUB_ENV"

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-write-only: true

      # Skipped when the Play Console / WIF setup is incomplete (vars unset); the
      # GitHub Release still publishes. Once the vars are populated, the publish
      # step below picks up automatically.
      - name: Authenticate to Google Cloud
        id: gcloud-auth
        if: ${{ vars.GCLOUD_WIF_PROVIDER != '' && vars.GCLOUD_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCLOUD_WIF_PROVIDER }}
          service_account: ${{ vars.GCLOUD_SERVICE_ACCOUNT }}

      # Drop maven-publish blocks (unused, broken under Gradle 8+) and rewrite
      # `proguard-android.txt` to the `-optimize` variant required by AGP 9.0.
      - name: Patch vendor build scripts
        run: |
          for f in vendor/termux-app/terminal-emulator/build.gradle vendor/termux-app/terminal-view/build.gradle; do
            sed -i "/apply plugin: 'maven-publish'/d; /task sourceJar/,/^}/d; /afterEvaluate/,/^}/d; s/proguard-android\.txt/proguard-android-optimize.txt/g" "$f"
          done

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/release.keystore"

      - name: Build release APK and AAB
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Stage release artifacts
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk \
             "artifacts/pocketsecureshell-${GITHUB_REF_NAME}.apk"
          cp app/build/outputs/bundle/release/app-release.aab \
             "artifacts/pocketsecureshell-${GITHUB_REF_NAME}.aab"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/*.apk
            artifacts/*.aab

      # Re-passes the build env so the build script's signingConfigs block keeps
      # evaluating cleanly; bundleRelease itself stays UP-TO-DATE from the build step.
      - name: Publish AAB to Play Store internal track
        if: ${{ steps.gcloud-auth.outcome == 'success' }}
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew publishReleaseBundle

      - name: Remove keystore from runner
        if: always()
        run: rm -f "${RUNNER_TEMP}/release.keystore"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/*.apk
            artifacts/*.aab
          generate_release_notes: true
