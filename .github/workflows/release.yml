on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Derive release version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag $GITHUB_REF_NAME does not match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Compute submodule cache key
        id: submodule-key
        run: |
          paths=$(git config -f .gitmodules --get-regexp path | awk '{print $2}')
          hash=$(git ls-tree HEAD -- $paths | sha256sum | awk '{print $1}')
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: submodule-cache
        with:
          path: |
            vendor
            .git/modules
          key: submodules-v2-${{ hashFiles('.gitmodules') }}-${{ steps.submodule-key.outputs.hash }}

      - name: Initialize submodules
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-write-only: true

      # Remove publishing blocks incompatible with Gradle 8.x (unused by this project)
      - name: Patch vendor build scripts
        run: |
          for f in vendor/termux-app/terminal-emulator/build.gradle vendor/termux-app/terminal-view/build.gradle; do
            sed -i "/apply plugin: 'maven-publish'/d; /task sourceJar/,/^}/d; /afterEvaluate/,/^}/d" "$f"
          done

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/release.keystore"

      - name: Build release APK
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Remove keystore from runner
        if: always()
        run: rm -f "${RUNNER_TEMP}/release.keystore"

      - name: Stage release artifacts
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk \
             "artifacts/pocketsecureshell-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.apk
          generate_release_notes: true
